# fly.toml app configuration file generated for notion-sapiens on 2026-03-08T16:22:58Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'notion-sapiens'
primary_region = 'iad'

[build]
  [build.args]
    NEXT_PUBLIC_CONVEX_URL = "https://qualified-scorpion-992.convex.cloud"
    NEXT_PUBLIC_CONVEX_SITE_URL = "https://qualified-scorpion-992.convex.site"
    NEXT_PUBLIC_SITE_URL = "https://notion-sapiens.fly.dev"
    NEXT_PUBLIC_DIST_DOMAIN_NAME = "distribution.sapienstudio.art"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
